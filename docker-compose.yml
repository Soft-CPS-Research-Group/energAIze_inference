services:
  inference:
    build:
      context: .
      dockerfile: Dockerfile
    image: energaize-inference:latest
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      LOG_JSON: "${LOG_JSON:-false}"
      MODEL_MANIFEST_PATH: "${MODEL_MANIFEST_PATH:-/data/icharging_boavista_with_flex/artifact_manifest.json}"
      MODEL_AGENT_INDEX: "${MODEL_AGENT_INDEX:-0}"
      FEATURE_ALIAS_PATH: "${FEATURE_ALIAS_PATH:-/data/icharging_boavista_with_flex/aliases.json}"
      ONNX_EXECUTION_PROVIDERS: "${ONNX_EXECUTION_PROVIDERS:-CPUExecutionProvider}"
    volumes:
      - "${BUNDLE_PATH:-./examples}:/data:ro"
    runtime: "${DOCKER_RUNTIME:-runc}"
