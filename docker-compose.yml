services:
  inference:
    build:
      context: .
      dockerfile: Dockerfile
    image: energaize-inference:latest
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      LOG_JSON: "${LOG_JSON:-false}"
      LOG_FILE: "${LOG_FILE:-/var/log/energaize/inference.log}"
      LOG_FILE_ROTATION: "${LOG_FILE_ROTATION:-250 MB}"
      LOG_FILE_RETENTION: "${LOG_FILE_RETENTION:-30 days}"
      LOG_FILE_COMPRESSION: "${LOG_FILE_COMPRESSION:-gz}"
      MODEL_MANIFEST_PATH: "${MODEL_MANIFEST_PATH:-/data/icharging_boavista_with_flex/artifact_manifest.json}"
      MODEL_AGENT_INDEX: "${MODEL_AGENT_INDEX:-0}"
      FEATURE_ALIAS_PATH: "${FEATURE_ALIAS_PATH:-/data/icharging_boavista_with_flex/aliases.json}"
      ONNX_EXECUTION_PROVIDERS: "${ONNX_EXECUTION_PROVIDERS:-CPUExecutionProvider}"
      ALLOWED_BUNDLE_ROOT: "${ALLOWED_BUNDLE_ROOT:-/data}"
    volumes:
      - "${BUNDLE_PATH:-./examples}:/data:ro"
      - "${LOGS_PATH:-./logs}:/var/log/energaize"
    runtime: "${DOCKER_RUNTIME:-runc}"
